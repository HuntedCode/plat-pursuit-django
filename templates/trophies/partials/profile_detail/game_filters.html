<form id="games-form" method="get">
    <div class="bg-base-300/40 rounded-lg p-2 md:p-3">
        <div class="flex flex-col md:flex-row gap-2 md:gap-3">
            <select name="sort" id="id_sort"
                    class="select select-bordered select-sm md:select-md w-full md:w-40 lg:w-48">
                {% for value, display in form.sort.field.choices %}
                    <option value="{{ value }}" {% if request.GET.sort == value %}selected{% endif %}>{{ display }}</option>
                {% endfor %}
            </select>

            <div class="flex flex-wrap gap-1.5 items-center flex-1">
                {% for value, display in form.platform.field.choices %}
                    <label class="cursor-pointer">
                        <input type="checkbox" name="platform" value="{{ value }}"
                               class="sr-only peer" {% if value in selected_platforms %}checked{% endif %} />
                        <span class="btn btn-xs peer-checked:btn-primary peer-checked:font-bold btn-ghost border border-base-300 transition-all">
                            {{ display }}
                        </span>
                    </label>
                {% endfor %}
            </div>

            <select name="plat_status" id="id_plat_status"
                    class="select select-bordered select-sm md:select-md w-full md:w-40 lg:w-48">
                {% for value, display in form.plat_status.field.choices %}
                    <option value="{{ value }}" {% if request.GET.plat_status == value %}selected{% endif %}>{{ display }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="flex flex-col md:flex-row gap-2 mt-2">
            <div class="relative flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" name="query" id="id_query" value="{{ request.GET.query }}"
                       class="input input-bordered input-sm md:input-md w-full pl-9 md:pl-10"
                       placeholder="Search games..." />
            </div>
            <button id="submit-btn" type="submit"
                    class="btn btn-sm md:btn-md btn-primary w-full md:w-auto gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <span class="hidden md:inline">Filter</span>
            </button>
        </div>
    </div>
    <input type="hidden" name="tab" value="games">
</form>

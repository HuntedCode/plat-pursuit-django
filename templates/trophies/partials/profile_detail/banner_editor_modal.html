<dialog id="banner-editor-modal" class="modal">
    <div class="modal-box max-w-4xl w-11/12 bg-base-200 border-2 border-base-300">
        <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </form>
        <h3 class="font-bold text-lg mb-1">Edit Profile Banner</h3>
        <p class="text-xs text-base-content/50 mb-4">Choose a game you've platinumed or 100%'d to use its art as your banner.</p>

        {# Game picker container #}
        <div id="banner-bg-picker-container" class="mb-4"></div>

        {# Position adjuster (hidden until image selected) #}
        <div id="banner-position-section" class="hidden">
            <h4 class="text-xs font-semibold text-base-content/60 uppercase tracking-wider mb-2">Adjust Position</h4>
            {# Preview breaks out of modal padding for edge-to-edge display #}
            <div class="-mx-6 px-0">
                <div class="relative w-full overflow-hidden aspect-[3/1] border-y border-base-content/10" id="banner-preview">
                    <div class="absolute inset-0 w-full h-full bg-cover" id="banner-preview-image" style="background-size: 100% auto;"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-base-100/80 via-base-100/30 to-transparent"></div>
                </div>
            </div>
            <input type="range" min="0" max="100" value="50" class="range range-sm range-primary w-full mt-2" id="banner-position-slider" />
            <div class="flex justify-between text-xs text-base-content/40 mt-0.5 px-1">
                <span>Top</span>
                <span>Center</span>
                <span>Bottom</span>
            </div>
        </div>

        {# Actions #}
        <div class="modal-action flex gap-2">
            <button id="banner-remove-btn" class="btn btn-sm btn-ghost text-error mr-auto">Remove Banner</button>
            <form method="dialog"><button class="btn btn-sm btn-ghost">Cancel</button></form>
            <button id="banner-save-btn" class="btn btn-sm btn-primary">Save Banner</button>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

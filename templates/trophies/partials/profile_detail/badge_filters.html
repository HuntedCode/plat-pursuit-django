<form id="badges-form" method="get">
    <div class="bg-white/[0.03] border border-base-content/5 rounded-lg p-2 md:p-3">
        <div class="flex flex-col md:flex-row gap-2">
            <select name="sort" id="id_sort"
                    class="select select-bordered select-sm md:select-md w-full md:w-48">
                {% for value, display in form.sort.field.choices %}
                    <option value="{{ value }}" {% if request.GET.sort == value %}selected{% endif %}>{{ display }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-sm md:btn-md btn-primary w-full md:w-auto gap-1.5">
                Sort
            </button>
        </div>
    </div>
    <input type="hidden" name="tab" value="badges">
</form>

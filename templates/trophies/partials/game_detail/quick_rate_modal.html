<dialog id="quick-rate-modal" class="modal">
    <div class="modal-box max-w-md bg-base-200 border-2 border-base-300">
        <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </form>
        <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span id="quick-rate-title">Rate This Game</span>
        </h3>

        <form id="quick-rate-form" class="space-y-3">
            <div class="form-control">
                <label class="label py-1"><span class="label-text text-sm">Difficulty</span><span class="label-text-alt font-bold" id="qr-difficulty-val">5</span></label>
                <input type="range" name="difficulty" min="1" max="10" value="5" class="range range-error range-sm w-full" step="1" />
                <div class="w-full flex justify-between text-[0.6rem] text-base-content/30 px-0.5"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
            </div>
            <div class="form-control">
                <label class="label py-1"><span class="label-text text-sm">Grindiness</span><span class="label-text-alt font-bold" id="qr-grindiness-val">5</span></label>
                <input type="range" name="grindiness" min="1" max="10" value="5" class="range range-accent range-sm w-full" step="1" />
                <div class="w-full flex justify-between text-[0.6rem] text-base-content/30 px-0.5"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
            </div>
            <div class="form-control">
                <label class="label py-1"><span class="label-text text-sm" id="qr-hours-label">Hours to Platinum</span></label>
                <input type="number" name="hours_to_platinum" min="1" class="input input-secondary input-sm w-full" placeholder="e.g., 20" />
            </div>
            <div class="form-control">
                <label class="label py-1"><span class="label-text text-sm">Fun Ranking</span><span class="label-text-alt font-bold" id="qr-fun-val">5</span></label>
                <input type="range" name="fun_ranking" min="1" max="10" value="5" class="range range-info range-sm w-full" step="1" />
                <div class="w-full flex justify-between text-[0.6rem] text-base-content/30 px-0.5"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
            </div>
            <div class="form-control">
                <label class="label py-1"><span class="label-text text-sm">Overall Rating</span><span class="label-text-alt font-bold" id="qr-overall-val">3.0</span></label>
                <input type="range" name="overall_rating" min="0.5" max="5.0" value="3" class="range range-warning range-sm w-full" step="0.5" />
                <div class="w-full flex justify-between text-[0.6rem] text-base-content/30 px-0.5"><span>0.5</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
            </div>
            <button type="submit" id="quick-rate-submit" class="btn btn-primary btn-sm w-full mt-2">
                Submit Rating
            </button>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

{% load humanize %}

<div class="card bg-base-100 border-2 border-base-300 shadow-sm shadow-neutral">
    <div class="card-body p-4">
        <button id="toggle-user-rating" type="button" class="w-full flex items-center justify-between cursor-pointer">
            <p class="text-lg lg:text-xl text-center text-base-content italic font-bold flex-1 pr-1">Your Rating</p>
            <svg id="user-rating-chevron" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-base-content/50 transition-transform duration-200 shrink-0 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>

        <div id="user-rating-content">
            {% if can_rate %}
                <div class="divider divider-vertical m-0 p-0"></div>
                <form id="rating-form" class="space-y-4">
                    <div class="form-control">
                        <label class="label"><span class="label-text text-base-content">Difficulty</span></label>
                        <input type="range" name="difficulty" min="1" max="10" value="{{ user_rating.difficulty|default:5 }}" class="range range-error range-sm w-full" step="1" />
                        <div class="w-full flex justify-between text-xs px-1"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text text-base-content">Grindiness</span></label>
                        <input type="range" name="grindiness" min="1" max="10" value="{{ user_rating.grindiness|default:5 }}" class="range range-accent range-sm w-full" step="1" />
                        <div class="w-full flex justify-between text-xs px-1"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text text-base-content">{{ hours_label_long|default:"Hours to Platinum" }}</span></label>
                        <input type="number" name="hours_to_platinum" value="{{ user_rating.hours_to_platinum|default:"" }}" min="1" class="input input-secondary input-sm w-full" placeholder="e.g., 20" />
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text text-base-content">Fun Ranking</span></label>
                        <input type="range" name="fun_ranking" min="1" max="10" value="{{ user_rating.fun_ranking|default:5 }}" class="range range-info range-sm w-full" step="1" />
                        <div class="w-full flex justify-between text-xs px-1"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text text-base-content">Overall Rating</span></label>
                        <input type="range" name="overall_rating" min="0.5" max="5.0" value="{{ user_rating.overall_rating|default:3 }}" class="range range-warning range-sm w-full" step="0.5" />
                        <div class="w-full flex justify-between text-xs"><span>0.5</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm w-full"{% if not user_rating %} disabled{% endif %}>
                        {% if user_rating %}Update Rating{% else %}Submit Rating{% endif %}
                    </button>
                </form>
            {% elif user.is_authenticated and can_rate_reason %}
                <div class="divider divider-vertical m-0 p-0"></div>
                <p class="text-xs text-base-content/50 text-center italic pr-1">{{ can_rate_reason }}</p>
            {% endif %}
        </div>
    </div>
</div>

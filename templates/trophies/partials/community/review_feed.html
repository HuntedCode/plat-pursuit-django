<div class="card bg-base-100 border-2 border-base-300 shadow-sm shadow-neutral">
    <div class="card-body p-4">
        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-2">
            <h2 class="text-lg font-bold text-base-content italic">
                Community Reviews
                {% if review_count %}
                    <span class="text-sm font-normal text-base-content/50">({{ review_count }})</span>
                {% endif %}
            </h2>
            <div class="flex gap-1" role="group" aria-label="Sort reviews">
                <button class="btn btn-xs sort-btn btn-primary" data-sort="helpful">Most Helpful</button>
                <button class="btn btn-xs sort-btn btn-ghost border border-base-300" data-sort="newest">Newest</button>
                <button class="btn btn-xs sort-btn btn-ghost border border-base-300" data-sort="oldest">Oldest</button>
            </div>
        </div>
        <div class="divider divider-vertical m-0 p-0"></div>

        {# Feed container: populated by JavaScript #}
        <div id="review-feed" class="flex flex-col gap-4">
            {# Review cards inserted here by JS #}
        </div>

        {# Empty state (shown/hidden by JS) #}
        <div id="review-feed-empty" class="hidden flex flex-col items-center gap-2 py-8">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-base-content/20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 01.865-.501 48.172 48.172 0 003.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/></svg>
            <p class="text-sm text-base-content/50 italic">No community reviews yet for this group.</p>
        </div>

        {# Infinite scroll sentinel #}
        <div id="review-sentinel" class="h-4"></div>

        {# Loading indicator #}
        <div id="review-loading" class="hidden flex justify-center py-4">
            <span class="loading loading-dots loading-lg text-primary"></span>
        </div>
    </div>
</div>

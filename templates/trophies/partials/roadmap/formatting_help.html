{# Collapsible markdown formatting reference guide #}
<div class="formatting-help hidden mt-2 mb-3 rounded-lg bg-base-200/50 border border-base-300 p-3">
    <p class="text-xs font-semibold text-base-content/60 uppercase tracking-wider mb-2">Formatting Guide</p>
    <div class="grid grid-cols-2 gap-x-4 gap-y-1.5 text-xs">
        <code class="font-mono text-base-content/70">**bold**</code>
        <span><strong>bold</strong></span>

        <code class="font-mono text-base-content/70">*italic*</code>
        <span><em>italic</em></span>

        <code class="font-mono text-base-content/70">__underline__</code>
        <span><u>underline</u></span>

        <code class="font-mono text-base-content/70">~~strike~~</code>
        <span><s>strike</s></span>

        <code class="font-mono text-base-content/70">[text](url)</code>
        <span><a class="link link-primary">text</a></span>

        <code class="font-mono text-base-content/70">`code`</code>
        <span><code class="bg-base-300 px-1 rounded text-xs">code</code></span>

        <code class="font-mono text-base-content/70">> quote</code>
        <span class="italic text-base-content/60 border-l-2 border-base-300 pl-2">quote</span>

        <code class="font-mono text-base-content/70">- list item</code>
        <span>&#8226; list item</span>
    </div>
    <p class="text-xs text-base-content/40 mt-2">Shortcuts: Ctrl+B (bold), Ctrl+I (italic), Ctrl+U (underline)</p>
</div>

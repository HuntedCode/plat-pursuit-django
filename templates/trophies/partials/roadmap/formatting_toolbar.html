{# Compact markdown formatting toolbar. Place directly above a textarea. #}
<div class="formatting-toolbar flex items-center gap-0.5 mb-1 p-1 rounded-lg bg-white/[0.03] border border-base-content/5">
    <button type="button" class="fmt-btn btn btn-ghost btn-xs font-bold" data-fmt="bold" title="Bold (Ctrl+B)">B</button>
    <button type="button" class="fmt-btn btn btn-ghost btn-xs italic" data-fmt="italic" title="Italic (Ctrl+I)"><em>I</em></button>
    <button type="button" class="fmt-btn btn btn-ghost btn-xs underline" data-fmt="underline" title="Underline (Ctrl+U)">U</button>
    <button type="button" class="fmt-btn btn btn-ghost btn-xs line-through" data-fmt="strike" title="Strikethrough">S</button>
    <div class="w-px h-4 bg-base-content/10 mx-0.5"></div>
    <button type="button" class="fmt-btn btn btn-ghost btn-xs" data-fmt="link" title="Link">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
    </button>
    <button type="button" class="fmt-btn btn btn-ghost btn-xs" data-fmt="list" title="Bullet List">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <button type="button" class="fmt-btn btn btn-ghost btn-xs" data-fmt="quote" title="Quote">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
    </button>
    <button type="button" class="fmt-btn btn btn-ghost btn-xs" data-fmt="image" title="Upload Image">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
    </button>
    <div class="w-px h-4 bg-base-content/10 mx-0.5"></div>
    <button type="button" class="fmt-btn btn btn-ghost btn-xs" data-fmt="trophy-link" title="Link to Trophy Guide">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
    </button>
    <div class="ml-auto">
        <button type="button" class="fmt-help-toggle btn btn-ghost btn-xs text-base-content/40 hover:text-base-content/70 gap-1" title="Formatting Help">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="hidden md:inline text-xs">Help</span>
        </button>
    </div>
</div>

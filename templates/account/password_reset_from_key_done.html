{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}
{% block robots %}noindex, nofollow{% endblock %}
{% block content %}
<div class="container mx-auto p-3 md:p-4 max-w-lg">
    <div class="card bg-base-200/70 border-2 border-base-300 shadow-md shadow-neutral">
        <div class="card-body p-4 md:p-6 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mx-auto text-success mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <h2 class="text-xl md:text-2xl font-bold mb-2">Password Reset Complete</h2>
            <p class="text-sm text-base-content/60 mb-4" role="status">Your password has been updated. Log in with your new credentials.</p>
            <a href="{% url 'account_login' %}" class="btn btn-primary btn-sm md:btn-md w-full">Log In</a>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Email Confirmed{% endblock %}
{% block robots %}noindex, nofollow{% endblock %}

{% block main_layout %}
<main id="main-content" class="flex-1 flex items-center justify-center px-4 py-6 md:py-10" role="main">
    <div class="w-full max-w-lg">
        <div class="card bg-base-200/90 border-2 border-base-300 shadow-lg shadow-neutral">
            <div class="card-body p-3 md:p-5 lg:p-7 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mx-auto text-success mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <h2 class="text-xl md:text-2xl font-bold mb-2">Email Confirmed</h2>
                <p class="text-sm text-base-content/60 mb-4" role="status">Your email is confirmed. Time to start hunting.</p>
                <a href="{% url 'account_login' %}" class="btn btn-primary btn-sm md:btn-md w-full">Sign In</a>
            </div>
        </div>
    </div>
</main>
{% endblock %}

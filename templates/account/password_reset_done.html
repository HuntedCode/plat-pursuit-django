{% extends 'base.html' %}

{% block title %}Reset Link Sent{% endblock %}
{% block robots %}noindex, nofollow{% endblock %}

{% block main_layout %}
<main id="main-content" class="flex-1 flex items-center justify-center px-4 py-6 md:py-10" role="main">
    <div class="w-full max-w-lg">
        <div class="card bg-base-200/90 border-2 border-base-300 shadow-lg shadow-neutral">
            <div class="card-body p-3 md:p-5 lg:p-7 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mx-auto text-success mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <h2 class="text-xl md:text-2xl font-bold mb-2">Reset Link Sent</h2>
                <p class="text-sm text-base-content/60 mb-4" role="status">If an account exists with that email, we've sent a reset link. Check your inbox (and spam folder).</p>
                <a href="{% url 'account_login' %}" class="btn btn-primary btn-sm md:btn-md w-full">Back to Sign In</a>
            </div>
        </div>
    </div>
</main>
{% endblock %}

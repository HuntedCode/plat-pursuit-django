{% extends 'base.html' %}

{% block title %}Reset Link Sent{% endblock %}
{% block robots %}noindex, nofollow{% endblock %}
{% block content %}
<div class="container mx-auto p-3 md:p-4 max-w-lg">
    <div class="card bg-base-200/70 border-2 border-base-300 shadow-md shadow-neutral">
        <div class="card-body p-4 md:p-6 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mx-auto text-success mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <h2 class="text-xl md:text-2xl font-bold mb-2">Reset Link Sent</h2>
            <p class="text-sm text-base-content/60 mb-4" role="status">If an account exists with that email, we've sent a reset link. Check your inbox (and spam folder).</p>
            <a href="{% url 'account_login' %}" class="btn btn-primary btn-sm md:btn-md w-full">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}

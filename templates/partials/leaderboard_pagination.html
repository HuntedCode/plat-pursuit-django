{% load query_tags humanize %}
<div class="flex flex-col md:flex-row justify-between items-center gap-2 md:gap-4 mt-3 mb-1">
    <div class="join">
        {% if page_obj.has_previous %}
        <a href="?{% query_transform_key page_param 1 %}" class="btn btn-xs join-item">First</a>
        <a href="?{% query_transform_key page_param page_obj.previous_page_number %}" class="btn btn-xs join-item">Prev</a>
        {% endif %}
        <span class="btn btn-xs btn-secondary btn-active join-item">{{ page_obj.number }}/{{ paginator.num_pages }}</span>
        {% if page_obj.has_next %}
        <a href="?{% query_transform_key page_param page_obj.next_page_number %}" class="btn btn-xs join-item">Next</a>
        <a href="?{% query_transform_key page_param paginator.num_pages %}" class="btn btn-xs join-item">Last</a>
        {% endif %}
    </div>
    <div class="flex items-center gap-2 md:gap-4">
        <span class="text-[0.6rem] md:text-xs text-base-content/50 italic">{{ paginator.count|intcomma }} total</span>
        {% if user_page %}
            <a href="?{% query_transform_key page_param user_page %}#{{ rank_prefix }}-rank-{{ user_rank }}" class="btn btn-xs btn-accent tooltip" data-tip="Jump to your rank">My Rank</a>
        {% endif %}
        <form class="input-group flex items-center gap-0" onsubmit="PlatPursuit.LeaderboardUtils.updatePage(this, '{{ page_param }}'); return false;">
            <input type="number" class="input input-bordered input-xs w-14 md:w-16" min="1" max="{{ paginator.num_pages }}" placeholder="#" />
            <button type="submit" class="btn btn-xs btn-primary">Go</button>
        </form>
    </div>
</div>
